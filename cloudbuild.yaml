# This is the new, correct content for your cloudbuild.yaml

steps:
  # Step 1: Run a clean, full npm install.
  # This explicitly installs all dependencies, including 'nuxt', solving the 'not found' error.
  - name: "node:20"
    entrypoint: "npm"
    args: [ "install" ]

  # Step 2: Manually run the "build" script from your package.json.
  # This will trigger 'nuxt build', which automatically runs 'nuxt prepare' now that 'nuxt' is installed.
  - name: "node:20"
    entrypoint: "npm"
    args: [ "run", "build" ]

  # Step 3: Package the final, built application into a container.
  # This takes the output of the build step (the .output folder) and puts it in a runnable container.
  - name: "gcr.io/k8s-skaffold/pack"
    args:
      - "build"
      - "--builder=gcr.io/buildpacks/builder"
      # This path is critical for Nuxt 3. It points to the actual server code generated by the build.
      - "--path=./.output/server"
      - "--publish"
      - "us-central1-docker.pkg.dev/byteeit-testing-project/cloud-run-source-de\
        ploy/frontend-service:final-control-test"
