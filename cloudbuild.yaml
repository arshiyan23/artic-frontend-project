steps:
  # Step 1: Install dependencies using the exact Node.js version you use locally.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "ci" ]
    id: "Install Dependencies"

  # Step 2: Build the Nuxt application, also using the correct Node.js version.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 3: Deploy the built source to Cloud Run. The --source flag is smart
  # and will correctly package your built Nuxt app from the .output directory.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
