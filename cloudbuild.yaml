steps:
  # Step 1: Install dependencies using the correct Node.js version.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "install" ]
    id: "Install Dependencies"

  # Step 2: Build the Nuxt application.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 3: Deploy. This is the final, correct version.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
