steps:
  # Step 1: Use 'npm ci' which respects the package-lock.json and is the correct
  # command for CI/CD environments. It will correctly handle the postinstall script.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "ci" ]
    id: "Install Dependencies"

  # Step 2: Build the Nuxt application.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 3: Deploy the built source. The environment variables are handled in the UI.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
