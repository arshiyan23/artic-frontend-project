steps:
  # Step 1: Install dependencies using 'npm install' but IGNORE the broken postinstall script.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "install", "--ignore-scripts" ]
    id: "Install Dependencies"

  # Step 2: Manually run the 'nuxt prepare' script now that dependencies are installed.
  - name: "node:22"
    entrypoint: "./node_modules/.bin/nuxt"
    args: [ "prepare" ]
    id: "Prepare Nuxt App"

  # Step 3: Run the final Nuxt build command.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 4: Deploy the built source. This does NOT touch your environment variables.
  # This is the command that was almost working before. It uses Google's builders.
  # We add a longer startup timeout just in case, which is best practice for SSR apps.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
      - "--cpu=1"
      - "--timeout=600"
id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
