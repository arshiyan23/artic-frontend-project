steps:
  # Step 1: Install Node.js v18, install dependencies, and run the Nuxt build.
  # This uses a standard 'node' image and runs a series of commands.
  # This is the most robust way to ensure the correct Node.js version is used.
  - name: "node:18"
    entrypoint: "npm"
    args: [ "install" ]
    id: "Install Dependencies"

  - name: "node:18"
    entrypoint: "npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 2: Deploy to Cloud Run from the current source.
  # The '--source .' flag tells gcloud to intelligently package and deploy
  # the application, using the '.output' directory that was just created.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
    id: "Deploy Frontend Service"

options:
  logging: CLOUD_LOGGING_ONLY
