steps:
  # Step 1: Install dependencies using 'npm install', which works without a package-lock.json.
  # We are still using the correct Node.js v22 image.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "install" ] # THIS IS THE FIX
    id: "Install Dependencies"

  # Step 2: Build the Nuxt application.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 3: Deploy the built source to Cloud Run.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
