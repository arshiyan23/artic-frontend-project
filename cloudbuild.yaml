steps:
  # Step 1: Install dependencies
  - name: "node:22"
    entrypoint: "npm"
    args: [ "install" ]
    id: "Install Dependencies"

  # Step 2: Build the Nuxt application
  - name: "node:22"
    entrypoint: "npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 3: Deploy with all necessary flags, including the environment variables.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
      - "--set-env-vars=API_BASE_URL=https://backend-service-qylp2g3ica-uc.a.ru\
        n.app,API_AUTH_KEY=not-a-real-key" # THIS IS THE FINAL FIX
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
