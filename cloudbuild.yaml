steps:
  # Step 1: Use the official Google Cloud Node.js builder.
  # This runs 'npm ci' which is a faster, more reliable version of 'npm install' for CI/CD.
  # This builder has the complete environment needed for 'nuxt prepare' to succeed.
  - name: "gcr.io/cloud-builders/npm"
    args: [ "ci" ]
    id: "Install Dependencies"

  # Step 2: Use the same official builder to run the Nuxt build.
  - name: "gcr.io/cloud-builders/npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 3: Deploy the built source to Cloud Run.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
