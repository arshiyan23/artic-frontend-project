steps:
  # 1. Build the container image using Google's buildpacks
  - name: "gcr.io/k8s-skaffold/pack"
    args:
      - "build"
      - "--builder=gcr.io/buildpacks/builder"
      - "--publish"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fronten\
        d-service:latest" # Correct name with 'latest' tag
    id: "Build Frontend Image"

  # 2. Deploy to Cloud Run, referencing the exact image built in the previous step
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service" # The name of your Cloud Run service
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fronten\
        d-service:latest" # The exact image name from the build step
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated" # IMPORTANT: Make the frontend public
    id: "Deploy Frontend Service"
