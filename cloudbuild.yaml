steps:
  # Step 1: Install dependencies
  - name: "gcr.io/cloud-builders/npm"
    args: [ "install" ]
    id: "Install Dependencies"

  # Step 2: Run the Nuxt build command. This creates the production-ready .output directory.
  - name: "gcr.io/cloud-builders/npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 3: Use the standard builder to package the app. It will now find the built .output directory.
  - name: "gcr.io/k8s-skaffold/pack"
    args:
      - "build"
      - "--builder=gcr.io/buildpacks/builder"
      - "--publish"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fronten\
        d-service:latest"
    id: "Build Frontend Image"

  # Step 4: Deploy the final image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fronten\
        d-service:latest"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
