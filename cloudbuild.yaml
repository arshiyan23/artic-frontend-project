steps:
  # Step 1: Build the Docker image using the Dockerfile we just created.
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/front\
          end-service:$COMMIT_SHA",
        ".",
      ]
    id: "Build"

  # Step 2: Push the successfully built image to Google's Artifact Registry.
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/front\
          end-service:$COMMIT_SHA",
      ]
    id: "Push"

  # Step 3: Deploy that specific, immutable image to Cloud Run.
  # This does NOT set environment variables, so it will preserve your UI settings.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fronten\
        d-service:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
    id: "Deploy"
options:
  logging: CLOUD_LOGGING_ONLY
