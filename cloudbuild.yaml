steps:
  # Step 1: Build the Docker image using the correct Dockerfile.
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/front\
          end-service:$COMMIT_SHA",
        ".",
      ]
    id: "Build"

  # Step 2: Push the image to the registry.
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/front\
          end-service:$COMMIT_SHA",
      ]
    id: "Push"

  # Step 3: Deploy that image. This does NOT touch your environment variables.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fronten\
        d-service:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
    id: "Deploy"
options:
  logging: CLOUD_LOGGING_ONLY
