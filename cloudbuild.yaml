steps:
  # Step 1: Use a standard linux environment to install NVM and Node.js v18
  # This creates a reliable environment with the exact Node version we need.
  - name: "ubuntu"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        apt-get update && apt-get install -y curl
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.1/install.sh | bash
        export NVM_DIR="/root/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        nvm install 18
        nvm use 18
        npm ci
        npm run build
    id: "Build Nuxt Application"

  # Step 2: Deploy to Cloud Run from the source directory.
  # gcloud will find the .output directory created in the previous step
  # and deploy it correctly.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
