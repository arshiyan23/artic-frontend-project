steps:
  # Step 1: Install dependencies using the correct Node.js version.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "install" ]
    id: "Install Dependencies"

  # Step 2: Build the Nuxt application.
  - name: "node:22"
    entrypoint: "npm"
    args: [ "run", "build" ]
    id: "Run Nuxt Build"

  # Step 3: Deploy. This is the final, correct version.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--source"
      - "."
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
      # THIS IS THE FINAL FIX: Set HOST=0.0.0.0 to make the container accessible
      # from the outside, and ensure the other variables are also present.
      - "--set-env-vars=HOST=0.0.0.0,API_BASE_URL=https://backend-service-qylp2\
        g3ica-uc.a.run.app,API_AUTH_KEY=not-a-real-key"
    id: "Deploy Frontend Service"
options:
  logging: CLOUD_LOGGING_ONLY
