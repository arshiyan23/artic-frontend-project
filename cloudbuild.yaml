steps:
  # 1. Build the container
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/frontend-service:$COMMIT_SHA'
      - '.'

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/frontend-service:$COMMIT_SHA']

  # 3. Deploy the image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'frontend-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/frontend-service:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      # Re-use the existing service account configured in Terraform
      - '--service-account'
      - 'frontend-sa@$PROJECT_ID.iam.gserviceaccount.com'
      # Ensure it remains publicly accessible
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/frontend-service:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
