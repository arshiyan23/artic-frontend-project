name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    env:
      NUXT_DRUPAL_BASE_URL: ${{ vars.NUXT_DRUPAL_BASE_URL }}
      NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
      NUXT_PUBLIC_IMG_BASE_URL: ${{ vars.NUXT_PUBLIC_IMG_BASE_URL }}
      NUXT_PUBLIC_FRONTEND_BASE_URL: ${{ vars.NUXT_PUBLIC_FRONTEND_BASE_URL }}
      NUXT_PUBLIC_GTAG_ID: ${{ vars.NUXT_PUBLIC_GTAG_ID }}
      NUXT_PUBLIC_API_AUTH_KEY: ${{ secrets.NUXT_PUBLIC_API_AUTH_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Write Nuxt build env
        run: |
          cat > .env <<'EOF'
          NUXT_DRUPAL_BASE_URL=${{ vars.NUXT_DRUPAL_BASE_URL }}
          NUXT_PUBLIC_API_BASE_URL=${{ vars.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_IMG_BASE_URL=${{ vars.NUXT_PUBLIC_IMG_BASE_URL }}
          NUXT_PUBLIC_FRONTEND_BASE_URL=${{ vars.NUXT_PUBLIC_FRONTEND_BASE_URL }}
          NUXT_PUBLIC_GTAG_ID=${{ vars.NUXT_PUBLIC_GTAG_ID }}
          NUXT_PUBLIC_API_AUTH_KEY=${{ secrets.NUXT_PUBLIC_API_AUTH_KEY }}
          EOF

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_GLACIER_02C132300 }}
          action: upload
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: ".output/public" # Built app content directory - optional
          app_build_command: npm run generate

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: close
